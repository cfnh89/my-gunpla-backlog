<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunpla Inventory Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400&display=swap');

        :root {
            --gundam-blue: #0056b3;
            --gundam-red: #d90429;
            --gundam-yellow: #f48c06;
            --gundam-white: #f8f9fa;
            --gundam-accent: #e9ecef;
            --gundam-text: #212529;
            --qmsv-purple: #6200ea;
        }

        body {
            background-color: var(--gundam-white);
            color: var(--gundam-text);
            font-family: 'Roboto Mono', monospace;
            background-image: 
                linear-gradient(rgba(0, 86, 179, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 86, 179, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        h1, h2, .nav-btn {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 86, 179, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--gundam-blue);
            color: var(--gundam-blue);
            transition: all 0.3s ease;
        }

        .btn-primary:hover, .active-nav-blue {
            background: var(--gundam-blue);
            color: white;
            box-shadow: 0 0 15px rgba(0, 86, 179, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--gundam-red);
            color: var(--gundam-red);
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--gundam-red);
            color: white;
            box-shadow: 0 0 15px rgba(217, 4, 41, 0.3);
        }

        .btn-qmsv {
            background: transparent;
            border: 1px solid var(--qmsv-purple);
            color: var(--qmsv-purple);
            transition: all 0.3s ease;
        }

        .btn-qmsv:hover, .active-nav-purple {
            background: var(--qmsv-purple);
            color: white;
            box-shadow: 0 0 15px rgba(98, 0, 234, 0.3);
        }

        .sort-btn {
            font-size: 0.65rem;
            padding: 4px 8px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            color: #6c757d;
            transition: all 0.2s;
        }

        .sort-btn:hover {
            border-color: var(--gundam-blue);
            color: var(--gundam-blue);
        }

        input, select {
            background: var(--gundam-accent) !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            color: var(--gundam-text) !important;
        }

        input:focus, select:focus {
            border-color: var(--gundam-blue) !important;
            outline: none;
            background: white !important;
        }

        table { border-collapse: separate; border-spacing: 0 8px; }

        tr { transition: transform 0.2s; }
        tr:hover { transform: scale(1.005); background: rgba(0, 86, 179, 0.02); }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: #e7f1ff;
            color: var(--gundam-blue);
            border: 1px solid var(--gundam-blue);
        }

        .qmsv-badge {
            background: #f3e5f5;
            color: var(--qmsv-purple);
            border: 1px solid var(--qmsv-purple);
        }

        .no-column { color: var(--gundam-blue); font-weight: bold; width: 40px; }

        .corner-accent {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--gundam-blue);
        }
        .top-left { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .bottom-right { bottom: 0; right: 0; border-left: 0; border-top: 0; }

        #edit-modal {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }

        #sync-status {
            position: fixed;
            top: 1rem;
            right: 1rem;
            font-size: 0.65rem;
            z-index: 100;
        }

        .google-btn {
            background: #4285F4;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .google-btn:hover { opacity: 0.9; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="sync-status" class="flex flex-col items-end gap-2">
        <div class="flex items-center gap-2 bg-white/90 px-3 py-1.5 rounded-full border border-gray-200 shadow-sm">
            <div id="sync-indicator" class="w-2 h-2 rounded-full bg-yellow-400"></div>
            <span id="sync-text" class="text-gray-500 uppercase tracking-tighter font-bold">Connecting...</span>
            <span id="user-display-name" class="hidden text-blue-600 font-bold ml-1"></span>
        </div>
        <button id="auth-action-btn" class="google-btn text-[10px] hidden uppercase tracking-widest">
            Sign in with Google
        </button>
    </div>

    <div id="app" class="max-w-4xl mx-auto relative pb-20">
        <header class="mb-12 text-center relative py-6">
            <div class="corner-accent top-left"></div>
            <div class="corner-accent bottom-right"></div>
            <h1 id="main-title" class="text-3xl md:text-5xl font-bold mb-2 text-blue-900">Backlog Command</h1>
            <p id="sub-title" class="text-gray-400 text-sm tracking-widest uppercase">Multi-Device Cloud Sync</p>
        </header>

        <div id="main-nav" class="flex flex-col md:flex-row gap-3 justify-center mb-12">
            <button id="nav-backlog" onclick="showPage('list')" class="nav-btn btn-primary px-6 py-3 rounded-sm flex items-center justify-center gap-2 flex-1 active-nav-blue">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>
                Backlog
            </button>
            <button id="nav-qmsv" onclick="showPage('qmsv')" class="nav-btn btn-qmsv px-6 py-3 rounded-sm flex items-center justify-center gap-2 flex-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M15 3v18"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
                QMSV Mini
            </button>
        </div>

        <!-- Backlog List Page -->
        <div id="page-list" class="page hidden">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4 px-2">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] text-gray-400 font-bold tracking-tighter uppercase">Sort By:</span>
                    <button onclick="sortData('backlog', 'modelName')" class="sort-btn">NAME</button>
                    <button onclick="sortData('backlog', 'brand')" class="sort-btn">BRAND</button>
                    <button onclick="sortData('backlog', 'price')" class="sort-btn">PRICE</button>
                </div>
                <button onclick="showAddForm('backlog')" class="btn-secondary px-4 py-2 rounded text-xs font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    NEW ENTRY
                </button>
            </div>

            <div class="glass-panel p-6 rounded-lg overflow-x-auto mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl text-blue-800">Operational Backlog</h2>
                    <span id="kit-count-header" class="text-xs bg-blue-100 text-blue-800 px-3 py-1 rounded-full border border-blue-200">0 Units</span>
                </div>
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-500 text-xs border-b border-gray-200">
                            <th class="pb-4 font-normal">#</th>
                            <th class="pb-4 font-normal">BRAND</th>
                            <th class="pb-4 font-normal">MODEL NAME</th>
                            <th class="pb-4 font-normal">SIZE/GRADE</th>
                            <th class="pb-4 font-normal">UNITS</th>
                            <th class="pb-4 font-normal">PRICE (EACH)</th>
                            <th class="pb-4 font-normal">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="backlog-table-body"></tbody>
                    <tfoot id="backlog-table-footer" class="hidden">
                        <tr class="border-t-2 border-blue-900 bg-blue-50/50">
                            <td colspan="4" class="py-6 px-4 text-right font-bold text-blue-900 uppercase text-xs tracking-widest">Total Value:</td>
                            <td id="total-units-cell" class="py-6 font-bold text-blue-900 text-lg">0</td>
                            <td colspan="2" id="total-price-cell" class="py-6 font-bold text-red-600 text-lg font-mono">RM 0.00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- QMSV Mini Collection Page -->
        <div id="page-qmsv" class="page hidden">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4 px-2">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] text-gray-400 font-bold tracking-tighter uppercase">Sort By:</span>
                    <button onclick="sortData('qmsv', 'modelName')" class="sort-btn">NAME</button>
                    <button onclick="sortData('qmsv', 'series')" class="sort-btn">SERIES</button>
                </div>
                <button onclick="showAddForm('qmsv')" class="btn-qmsv px-4 py-2 rounded text-xs font-bold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    ADD FIGURE
                </button>
            </div>

            <div class="glass-panel p-6 rounded-lg overflow-x-auto mb-6 border-purple-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl text-purple-800">QMSV Mini Archive</h2>
                    <span id="qmsv-count-header" class="text-xs bg-purple-100 text-purple-800 px-3 py-1 rounded-full border border-purple-200">0 Figures</span>
                </div>
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-500 text-xs border-b border-gray-200">
                            <th class="pb-4 font-normal">#</th>
                            <th class="pb-4 font-normal">SERIES</th>
                            <th class="pb-4 font-normal">NAME</th>
                            <th class="pb-4 font-normal">TYPE</th>
                            <th class="pb-4 font-normal">QTY</th>
                            <th class="pb-4 font-normal">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="qmsv-table-body"></tbody>
                </table>
                <div id="qmsv-empty-state" class="text-center py-12 text-gray-400 hidden">
                    NO QMSV FIGURES REGISTERED
                </div>
            </div>
        </div>

        <!-- Add Form Page -->
        <div id="page-add" class="page hidden">
            <div class="glass-panel p-8 rounded-lg max-w-lg mx-auto relative">
                <h2 id="form-title" class="text-xl mb-8 border-l-4 pl-4 uppercase tracking-tighter">Registry</h2>
                
                <form id="add-kit-form" class="space-y-6">
                    <div id="brand-field">
                        <label id="brand-label" class="block text-xs text-gray-500 mb-2 uppercase">BRAND</label>
                        <input type="text" id="brand" required class="w-full p-3 rounded">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-2 uppercase">MODEL NAME</label>
                        <input type="text" id="modelName" required class="w-full p-3 rounded">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label id="size-label" class="block text-xs text-gray-500 mb-2 uppercase">GRADE / SIZE</label>
                            <input type="text" id="size" required class="w-full p-3 rounded">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-2 uppercase">QTY</label>
                            <input type="number" id="units" required min="1" value="1" class="w-full p-3 rounded">
                        </div>
                    </div>
                    <div id="price-field">
                        <label class="block text-xs text-gray-500 mb-2 uppercase">PRICE PER UNIT (RM)</label>
                        <input type="number" step="0.01" id="price" required placeholder="0.00" class="w-full p-3 rounded">
                    </div>
                    <div class="pt-4 flex gap-3">
                        <button type="submit" id="submit-btn" class="flex-1 py-3 rounded font-bold text-white">CONFIRM REGISTRY</button>
                        <button type="button" onclick="cancelAdd()" class="px-6 py-3 border border-gray-300 text-gray-500 hover:text-gray-800 transition-colors">CANCEL</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Edit Modal -->
        <div id="edit-modal" class="fixed inset-0 hidden flex items-center justify-center z-[100] p-4">
            <div class="glass-panel p-8 rounded-lg max-w-lg w-full relative">
                <h2 class="text-xl text-blue-600 mb-8 border-l-4 border-blue-600 pl-4 uppercase tracking-widest">Update Data</h2>
                <form id="edit-kit-form" class="space-y-6">
                    <input type="hidden" id="edit-id">
                    <input type="hidden" id="edit-type">
                    <div>
                        <label class="block text-xs text-gray-500 mb-2">BRAND / SERIES</label>
                        <input type="text" id="edit-brand" required class="w-full p-3 rounded">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-2">MODEL NAME</label>
                        <input type="text" id="edit-modelName" required class="w-full p-3 rounded">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-2">SIZE / TYPE</label>
                            <input type="text" id="edit-size" required class="w-full p-3 rounded">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-2">UNITS</label>
                            <input type="number" id="edit-units" required min="1" class="w-full p-3 rounded">
                        </div>
                    </div>
                    <div id="edit-price-field">
                        <label class="block text-xs text-gray-500 mb-2">PRICE (RM)</label>
                        <input type="number" step="0.01" id="edit-price" required class="w-full p-3 rounded">
                    </div>
                    <div class="pt-4 flex gap-3">
                        <button type="submit" class="flex-1 btn-primary py-3 rounded font-bold">SAVE CHANGES</button>
                        <button type="button" onclick="closeEditModal()" class="px-6 py-3 border border-gray-300 text-gray-500 hover:text-gray-800 transition-colors">BACK</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="msg-box" class="fixed bottom-8 right-8 glass-panel p-4 border-l-4 border-blue-600 shadow-xl transform translate-y-24 transition-transform duration-300 pointer-events-none z-50">
            <p id="msg-text" class="text-sm font-bold text-blue-900"></p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInAnonymously, 
            onAuthStateChanged, 
            signInWithCustomToken,
            GoogleAuthProvider,
            signInWithPopup,
            signOut 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            collection, 
            onSnapshot, 
            addDoc, 
            updateDoc, 
            deleteDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gunpla-tracker';

        // State
        let backlog = [];
        let qmsv = [];
        let currentActivePage = 'list';
        let currentAddType = 'backlog';
        let user = null;
        let unsubscribeBacklog = null;
        let unsubscribeQmsv = null;

        // --- AUTHENTICATION ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
                updateSyncUI('error');
            }
        }

        onAuthStateChanged(auth, (u) => {
            user = u;
            const authBtn = document.getElementById('auth-action-btn');
            const nameDisp = document.getElementById('user-display-name');
            
            if (user) {
                updateSyncUI('online');
                authBtn.classList.remove('hidden');
                
                if (user.isAnonymous) {
                    authBtn.innerText = "Connect Google Account";
                    nameDisp.classList.add('hidden');
                } else {
                    authBtn.innerText = "Sign Out";
                    nameDisp.innerText = user.displayName || user.email.split('@')[0];
                    nameDisp.classList.remove('hidden');
                }
                
                setupListeners();
            } else {
                updateSyncUI('offline');
                authBtn.classList.add('hidden');
                nameDisp.classList.add('hidden');
            }
        });

        document.getElementById('auth-action-btn').addEventListener('click', async () => {
            if (user && !user.isAnonymous) {
                if (confirm("Sign out of Cloud Command?")) {
                    await signOut(auth);
                    location.reload(); // Refresh to clear listeners/state
                }
            } else {
                const provider = new GoogleAuthProvider();
                try {
                    // This will link the anonymous data to the Google account if linking logic was added,
                    // but for simplicity here we just sign in with Google.
                    await signInWithPopup(auth, provider);
                    showMessage("Access Granted: Welcome Commander.");
                } catch (err) {
                    console.error("Login Error:", err);
                    showMessage("Identity Verification Failed.");
                }
            }
        });

        function updateSyncUI(state) {
            const ind = document.getElementById('sync-indicator');
            const txt = document.getElementById('sync-text');
            if (state === 'online') {
                ind.className = 'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_5px_rgba(34,197,94,0.5)]';
                txt.innerText = 'Cloud Synced';
            } else if (state === 'error') {
                ind.className = 'w-2 h-2 rounded-full bg-red-500';
                txt.innerText = 'Sync Error';
            } else {
                ind.className = 'w-2 h-2 rounded-full bg-yellow-500 animate-pulse';
                txt.innerText = 'Connecting...';
            }
        }

        // --- FIRESTORE LISTENERS ---
        function setupListeners() {
            if (!user) return;

            // Cleanup old listeners if any
            if (unsubscribeBacklog) unsubscribeBacklog();
            if (unsubscribeQmsv) unsubscribeQmsv();

            // Backlog Listener
            const backlogRef = collection(db, 'artifacts', appId, 'users', user.uid, 'backlog');
            unsubscribeBacklog = onSnapshot(backlogRef, (snapshot) => {
                backlog = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (currentActivePage === 'list') renderBacklog();
            }, (err) => console.error("Backlog Listen Error:", err));

            // QMSV Listener
            const qmsvRef = collection(db, 'artifacts', appId, 'users', user.uid, 'qmsv');
            unsubscribeQmsv = onSnapshot(qmsvRef, (snapshot) => {
                qmsv = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (currentActivePage === 'qmsv') renderQMSV();
            }, (err) => console.error("QMSV Listen Error:", err));
        }

        // --- UI CORE ---
        window.showPage = function(pageId) {
            currentActivePage = pageId;
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            
            const title = document.getElementById('main-title');
            const navB = document.getElementById('nav-backlog');
            const navQ = document.getElementById('nav-qmsv');

            navB.classList.remove('active-nav-blue');
            navQ.classList.remove('active-nav-purple');

            if (pageId === 'list') {
                title.innerText = "Backlog Command";
                title.className = "text-3xl md:text-5xl font-bold mb-2 text-blue-900";
                navB.classList.add('active-nav-blue');
                renderBacklog();
            } else if (pageId === 'qmsv') {
                title.innerText = "QMSV Archive";
                title.className = "text-3xl md:text-5xl font-bold mb-2 text-purple-900";
                navQ.classList.add('active-nav-purple');
                renderQMSV();
            }
        };

        window.showAddForm = function(type) {
            currentAddType = type;
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-add').classList.remove('hidden');

            const fTitle = document.getElementById('form-title');
            const bLabel = document.getElementById('brand-label');
            const sLabel = document.getElementById('size-label');
            const pField = document.getElementById('price-field');
            const pInput = document.getElementById('price');
            const sBtn = document.getElementById('submit-btn');

            if (type === 'backlog') {
                fTitle.innerText = "Backlog Registry";
                fTitle.classList.add('border-red-600', 'text-red-600');
                fTitle.classList.remove('border-purple-600', 'text-purple-600');
                bLabel.innerText = "BRAND";
                sLabel.innerText = "GRADE / SIZE";
                pField.style.display = 'block';
                pInput.required = true;
                sBtn.style.backgroundColor = 'var(--gundam-red)';
            } else {
                fTitle.innerText = "QMSV Registry";
                fTitle.classList.add('border-purple-600', 'text-purple-600');
                fTitle.classList.remove('border-red-600', 'text-red-600');
                bLabel.innerText = "SERIES";
                sLabel.innerText = "TYPE (COMMON/SECRET)";
                pField.style.display = 'none';
                pInput.required = false;
                sBtn.style.backgroundColor = 'var(--qmsv-purple)';
            }
            document.getElementById('add-kit-form').reset();
        };

        window.cancelAdd = function() {
            showPage(currentAddType === 'backlog' ? 'list' : 'qmsv');
        };

        function renderBacklog() {
            const tbody = document.getElementById('backlog-table-body');
            const tfoot = document.getElementById('backlog-table-footer');
            const countHeader = document.getElementById('kit-count-header');
            
            tbody.innerHTML = '';
            let totalUnits = 0, totalValue = 0;

            if (backlog.length > 0) {
                tfoot.classList.remove('hidden');
                backlog.forEach((kit, index) => {
                    totalUnits += parseInt(kit.units);
                    totalValue += (kit.units * (kit.price || 0));
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-100">
                            <td class="py-4 no-column">${index+1}</td>
                            <td class="py-4 text-xs text-gray-500">${kit.brand}</td>
                            <td class="py-4 font-bold text-gray-900">${kit.modelName}</td>
                            <td class="py-4"><span class="status-badge">${kit.size}</span></td>
                            <td class="py-4 font-bold text-blue-900">${kit.units}</td>
                            <td class="py-4 text-blue-700 font-mono">RM ${parseFloat(kit.price || 0).toFixed(2)}</td>
                            <td class="py-4">
                                <div class="flex gap-2">
                                    <button onclick="openEdit('backlog', '${kit.id}')" class="text-gray-400 hover:text-blue-500"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                                    <button onclick="deleteItem('backlog', '${kit.id}')" class="text-gray-400 hover:text-red-500"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('total-units-cell').innerText = totalUnits;
                document.getElementById('total-price-cell').innerText = `RM ${totalValue.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            } else {
                tfoot.classList.add('hidden');
                tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-gray-400 uppercase text-xs tracking-widest">No Operational Units</td></tr>`;
            }
            countHeader.innerText = `${totalUnits} UNITS`;
        }

        function renderQMSV() {
            const tbody = document.getElementById('qmsv-table-body');
            const empty = document.getElementById('qmsv-empty-state');
            const countHeader = document.getElementById('qmsv-count-header');
            
            tbody.innerHTML = '';
            let total = 0;

            if (qmsv.length > 0) {
                empty.classList.add('hidden');
                qmsv.forEach((kit, index) => {
                    total += parseInt(kit.units);
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-100">
                            <td class="py-4 no-column">${index+1}</td>
                            <td class="py-4 text-xs text-purple-400">${kit.series || kit.brand}</td>
                            <td class="py-4 font-bold text-gray-900">${kit.modelName}</td>
                            <td class="py-4"><span class="status-badge qmsv-badge">${kit.type || kit.size}</span></td>
                            <td class="py-4 font-bold text-purple-900">${kit.units}</td>
                            <td class="py-4">
                                <div class="flex gap-2">
                                    <button onclick="openEdit('qmsv', '${kit.id}')" class="text-gray-400 hover:text-purple-500"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                                    <button onclick="deleteItem('qmsv', '${kit.id}')" class="text-gray-400 hover:text-red-500"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } else {
                empty.classList.remove('hidden');
            }
            countHeader.innerText = `${total} FIGURES`;
        }

        window.sortData = function(type, prop) {
            const list = (type === 'backlog' ? backlog : qmsv);
            list.sort((a, b) => String(a[prop] || a['series'] || '').toLowerCase().localeCompare(String(b[prop] || b['series'] || '').toLowerCase()));
            type === 'backlog' ? renderBacklog() : renderQMSV();
            showMessage(`Client-side Sort: ${prop}`);
        };

        window.openEdit = function(type, id) {
            const item = (type === 'backlog' ? backlog.find(x => x.id === id) : qmsv.find(x => x.id === id));
            if (!item) return;

            document.getElementById('edit-type').value = type;
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-brand').value = item.brand || item.series;
            document.getElementById('edit-modelName').value = item.modelName;
            document.getElementById('edit-size').value = item.size || item.type;
            document.getElementById('edit-units').value = item.units;
            document.getElementById('edit-price').value = item.price || 0;
            
            document.getElementById('edit-price-field').style.display = (type === 'backlog' ? 'block' : 'none');
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeEditModal = function() { document.getElementById('edit-modal').classList.add('hidden'); };

        document.getElementById('edit-kit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!user) return;

            const type = document.getElementById('edit-type').value;
            const id = document.getElementById('edit-id').value;
            const updated = {
                brand: document.getElementById('edit-brand').value,
                series: document.getElementById('edit-brand').value,
                modelName: document.getElementById('edit-modelName').value,
                size: document.getElementById('edit-size').value,
                type: document.getElementById('edit-size').value,
                units: parseInt(document.getElementById('edit-units').value),
                price: parseFloat(document.getElementById('edit-price').value) || 0
            };

            try {
                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, type, id);
                await updateDoc(docRef, updated);
                closeEditModal();
                showMessage("Cloud data updated.");
            } catch (err) {
                console.error("Update error:", err);
                showMessage("Sync Error!");
            }
        });

        window.deleteItem = async function(type, id) {
            if (!user) return;
            if (confirm(`Permanently delete this from cloud ${type}?`)) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, type, id);
                    await deleteDoc(docRef);
                    showMessage("Deleted from cloud.");
                } catch (err) {
                    console.error("Delete error:", err);
                    showMessage("Delete failed.");
                }
            }
        };

        document.getElementById('add-kit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!user) return;

            const newItem = {
                brand: document.getElementById('brand').value,
                series: document.getElementById('brand').value,
                modelName: document.getElementById('modelName').value,
                size: document.getElementById('size').value,
                type: document.getElementById('size').value,
                units: parseInt(document.getElementById('units').value),
                price: parseFloat(document.getElementById('price').value) || 0,
                createdAt: new Date().toISOString()
            };

            try {
                const colRef = collection(db, 'artifacts', appId, 'users', user.uid, currentAddType);
                await addDoc(colRef, newItem);
                showMessage("Cloud registry confirmed.");
                showPage(currentAddType === 'backlog' ? 'list' : 'qmsv');
            } catch (err) {
                console.error("Add error:", err);
                showMessage("Failed to save to cloud.");
            }
        });

        function showMessage(text) {
            const box = document.getElementById('msg-box');
            const msgText = document.getElementById('msg-text');
            if (msgText) msgText.innerText = `[SYSTEM]: ${text}`;
            if (box) box.style.transform = 'translateY(0)';
            setTimeout(() => { if (box) box.style.transform = 'translateY(150%)'; }, 2500);
        }

        // Init App
        initAuth();
        showPage('list');
    </script>
</body>
</html>
